<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twisted Duality | Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: transparent;
            --text-color: #000000;
            --glitch-color: #de7029;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            color: var(--text-color);
            font-family: 'WDXL Lubrifont JP N', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('web-background.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* --- LANGUAGE TOGGLE --- */
        .lang-switch {
            position: fixed;
            top: 25px;
            right: 30px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 100;
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 2px;
        }

        .lang-btn {
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.3s;
            text-decoration: none;
            color: var(--text-color);
        }

        .lang-btn.active {
            opacity: 1;
            font-weight: bold;
            border-bottom: 1px solid var(--text-color);
        }

        .main-terminal {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px 20px;
        }

        .main-logo {
            width: 100%;
            max-width: 280px;
            margin-bottom: 10px; 
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .subtext-header {
            width: 100%;
            max-width: 200px;
            height: auto;
            margin-top: 15px;
            margin-bottom: 5px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- SUBLIMINAL GLITCH LOGOS --- */
        .originals-logo { animation: glitchUrsprung 12s infinite; }
        @keyframes glitchUrsprung {
            0%, 96%, 99%, 100% { content: url('Twisted_Duality_Originals_subtext.png'); }
            97%, 98% { content: url('Twisted_Duality_Originals_subtext_glitch_for_DE.png'); }
        }

        .reimagined-logo { animation: glitchKonstruiert 7s infinite; }
        @keyframes glitchKonstruiert {
            0%, 93%, 97%, 100% { content: url('Twisted_Duality_Reimagined_subtext.png'); }
            94%, 96% { content: url('Twisted_Duality_Reimagined_subtext_glitch_for_DE.png'); }
        }

        .sector { margin-bottom: 35px; }

        .nav-link {
            display: block;
            margin: 14px 0;
            font-size: 1.15rem;
            color: var(--text-color);
            text-decoration: none;
            text-transform: lowercase;
            letter-spacing: 2px;
            position: relative;
        }

        .nav-link:hover, .nav-link.glitch-active { color: transparent; }
        .nav-link:hover::after, .nav-link.glitch-active::after {
            content: attr(data-glitch);
            position: absolute;
            left: 0; width: 100%; text-align: center;
            color: var(--glitch-color);
            animation: link-glitch 0.3s steps(2) infinite;
        }

        @keyframes link-glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .lang-content { display: none; }
        .lang-content.active { display: block; }

        .footer-log {
            margin-top: 50px;
            font-size: 0.7rem;
            opacity: 0.5;
            letter-spacing: 1px;
            line-height: 1.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="lang-switch">
        <span class="lang-btn active" id="btn-en" onclick="setLanguage('en')">EN日本</span>
        <span style="opacity: 0.2">|</span>
        <span class="lang-btn" id="btn-de" onclick="setLanguage('de')">DE日本</span>
    </div>

    <div class="main-terminal">
        <img src="Twisted_Duality_nosubtext.png" alt="Twisted Duality" class="main-logo">

        <div id="content-en" class="lang-content active">
            <img src="Twisted_Duality_Originals_subtext.png" alt="ORIGINALS" class="subtext-header originals-logo">
            <div class="sector">
                <a href="

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twisted Duality | Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --glitch-color: #de7029;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'WDXL Lubrifont JP N', "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background using your uploaded PNG */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('web-background.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* The transparent container */
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px 20px;
            background: transparent;
        }

        /* Tightened Logos */
        .main-logo {
            width: 100%;
            max-width: 280px;
            margin-bottom: 0;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .subtext-header {
            width: 100%;
            max-width: 200px;
            height: auto;
            margin-top: 0;
            margin-bottom: 5px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .sector {
            margin-bottom: 30px;
            margin-top: 0;
        }

        /* Link Styling */
        .nav-link {
            display: block;
            margin: 15px 0;
            font-size: 1.2rem;
            color: var(--text-color);
            text-decoration: none;
            text-transform: lowercase;
            letter-spacing: 2px;
            position: relative;
            transition: color 0.1s;
        }

        /* Phantom Glitch (Invisible Base Text) */
        .nav-link:hover, .nav-link.glitch-active {
            color: transparent;
        }

        .nav-link:hover::after, .nav-link.glitch-active::after {
            content: attr(data-glitch);
            position: absolute;
            left: 0;
            width: 100%;
            text-align: center;
            background: transparent;
            color: var(--glitch-color);
            animation: glitch 0.3s steps(2) infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .footer-log {
            margin-top: 40px;
            font-size: 0.7rem;
            opacity: 0.5;
